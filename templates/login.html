<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicare - Trusted Healthcare Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* ပုံနှင့် အလင်းအမှောင် ညှိထားသော Wrapper */
        .login-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #e3f2fd;
        }

        /* နွေးထွေးသော ဆရာဝန်နှင့်လူနာ ပုံရိပ် (Caring Scene) */
        .bg-healthcare {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* ဆရာဝန်က လူနာကို ကြင်နာစွာ အားပေးနေသောပုံ */
            background-image: url('https://images.unsplash.com/photo-1576765608535-5f04d1e3f289?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: brightness(0.85) contrast(1.1);
            z-index: 1;
        }

        /* ပုံပေါ်တွင် အပြာနုရောင် Overlay လေးအုပ်ထားခြင်း */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(13, 110, 253, 0.2), rgba(255, 255, 255, 0.1));
            z-index: 2;
        }

        /* Glassmorphism Login Card (ပိုမိုကြည်လင်ပြီး လှပသော Box) */
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 74, 153, 0.15);
            z-index: 10;
            text-align: center;
        }

        .icon-box {
            width: 70px; height: 70px;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.2);
        }

        h3 { color: #003366; font-weight: 800; }
        .text-muted { font-size: 0.9rem; }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            background: #f8fbff;
            border: 1px solid #dee2e6;
            transition: 0.3s;
        }

        .form-control:focus {
            background: #fff;
            box-shadow: 0 0 10px rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }

        .btn-login {
            background: linear-gradient(to right, #0d6efd, #00d2ff);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.4s;
            color: white;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(13, 110, 253, 0.3);
            filter: brightness(1.1);
        }

        .footer-links a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="bg-healthcare"></div>
        <div class="bg-overlay"></div>

        <div class="login-card">
            <div class="icon-box">
                <i class="fas fa-hand-holding-heart"></i>
            </div>
            <h3>Medicare Login</h3>
            <p class="text-muted mb-4">သင်၏ကျန်းမာရေးအတွက် အလေးထားဂရုစိုက်လျက်</p>

            <form action="/login" method="POST">
                <div class="mb-3 text-start">
                    <label class="small fw-bold mb-1 ms-1" style="color: #003366;">အီးမေးလ် သို့မဟုတ် ဖုန်းနံပါတ်</label>
                    <input type="text" name="username" class="form-control" placeholder="Email or Phone" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="small fw-bold mb-1 ms-1" style="color: #003366;">လျှို့ဝှက်နံပါတ်</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-login">လော့ဂ်အင်ဝင်မည်</button>
            </form>

            <div class="footer-links d-flex justify-content-between mt-4">
                <a href="#">Password မေ့နေသလား?</a>
                <a href="#">အကောင့်အသစ်ဖွင့်ရန်</a>
            </div>
        </div>
    </div>

</body>
</html>
